<font face="Courier New,Courier">PROGRAM greeting;</font>
<br><font face="Courier New,Courier">{</font>
<br><font face="Courier New,Courier">&nbsp; Written by: Joe Dorward</font>
<br><font face="Courier New,Courier">&nbsp; Date: 08/11/00</font>
<p><font face="Courier New,Courier">&nbsp; This program asks for the user's
name then prints</font>
<br><font face="Courier New,Courier">&nbsp; a greeting.</font>
<br><font face="Courier New,Courier">}</font>
<br><font face="Courier New,Courier">VAR</font>
<br><font face="Courier New,Courier">&nbsp; user_name : STRING[30];</font>
<p><font face="Courier New,Courier">BEGIN</font>
<br><font face="Courier New,Courier">&nbsp; WRITE('Please enter your name:
');</font>
<br><font face="Courier New,Courier">&nbsp; READLN(user_name);</font>
<p><font face="Courier New,Courier">&nbsp; WRITELN('Greetings: ',user_name);</font>
<br><font face="Courier New,Courier">END.</font>
</body>
